spring.application.name=demo

# --- Conexão com Banco de Dados ---
# Ele vai pegar os valores do .env. Se não achar, usa o valor padrão após os dois pontos
# Por padrão, usa H2 em memória (para desenvolvimento local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# --- JPA / Hibernate ---
# Importante: Como é H2 por padrão, usamos o dialeto H2
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# H2 Console (útil para desenvolvimento local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Servidor ---
server.port=${PORT:8080}

# --- MinIO / S3 ---
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME}

# --- Admin ---
app.admin.username=${APP_ADMIN_USERNAME}
app.admin.password=${APP_ADMIN_PASSWORD}

# Configuração do Redis (Reaproveitado do Tripshare)
spring.data.redis.host=${REDIS_HOST:192.168.0.51}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Integração Telegram
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}
